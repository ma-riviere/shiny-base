# Shiny Server Configuration
# Auto-generated from config.yml - do not edit directly

run_as shiny;

server {
    listen 3838;

    location / {
        site_dir /srv/shiny-server;
        log_dir /var/log/shiny-server;
        directory_index on;

        # Application initialization timeout (seconds)
        app_init_timeout 90;

        # Application idle timeout (seconds)
        app_idle_timeout 600;

        # Process scheduler: max concurrent R processes per application
        simple_scheduler 25;
    }
}

# Directory for bookmark state storage
bookmark_state_dir /srv/shiny-server/shiny_bookmarks;
