services:
  traefik:
    image: traefik:v2.11
    networks:
      - traefik-net
    command:
      - "--log.level=DEBUG"
      - "--api=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker.swarmmode=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.forwardedHeaders.trustedIPs=172.16.0.0/12"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=172.16.0.0/12"
      - "--certificatesresolvers.le.acme.email=ssl@ma-riviere.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-net"
        # Traefik dashboard routing (HTTPS only with basic auth)
        - "traefik.http.routers.traefik-http.rule=Host(`traefik.shiny-base.ma-riviere.com`)"
        - "traefik.http.routers.traefik-http.entrypoints=web"
        - "traefik.http.routers.traefik-http.middlewares=https-redirect"
        - "traefik.http.routers.traefik-https.rule=Host(`traefik.shiny-base.ma-riviere.com`)"
        - "traefik.http.routers.traefik-https.entrypoints=websecure"
        - "traefik.http.routers.traefik-https.tls=true"
        - "traefik.http.routers.traefik-https.tls.certresolver=le"
        - "traefik.http.routers.traefik-https.service=api@internal"
        # Basic auth middleware (reuse Jaeger credentials)
        - "traefik.http.middlewares.traefik-auth.basicauth.users={{< jaeger.basic_auth >}}"
        - "traefik.http.routers.traefik-https.middlewares=traefik-auth"
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  shiny:
    image: ${REGISTRY_IMAGE:-ghcr.io/ma-riviere/docker-shiny}:${IMAGE_TAG:-main}
    env_file:
      - /opt/shiny/.Renviron.prod
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-net"
        # Create middleware to redirect HTTP to HTTPS
        - "traefik.http.routers.shiny-http.rule=Host(`shiny-base.ma-riviere.com`)"
        - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
        - "traefik.http.routers.shiny-http.entrypoints=web"
        - "traefik.http.routers.shiny-http.middlewares=https-redirect"
        # Configure TLS
        - "traefik.http.routers.shiny-https.rule=Host(`shiny-base.ma-riviere.com`)"
        - "traefik.http.routers.shiny-https.entrypoints=websecure"
        - "traefik.http.routers.shiny-https.tls=true"
        - "traefik.http.routers.shiny-https.tls.certresolver=le"
        # Create middleware to redirect www to non-www
        - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https?://www\\.(.+)"
        - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://$${1}"
        - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
        - "traefik.http.routers.shiny-https.middlewares=www-redirect"
        # Load balancer on port 3838
        - "traefik.http.services.shiny.loadbalancer.server.port=3838"
        # Sticky sessions
        - "traefik.http.services.shiny.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.shiny.loadbalancer.sticky.cookie.name=shiny_session"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - traefik-net
    environment:
      - RENV_PROFILE=docker-4.5
    healthcheck:
      # Use HEAD request to avoid spawning R processes for auth-protected apps
      test:
        [
          "CMD-SHELL",
          "curl -sf --head http://localhost:3838/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - shiny_server_logs:/var/log/shiny-server
      - shinylogs:/srv/shiny-server/shinylogs

  netdata:
    image: netdata/netdata:stable
    hostname: "shiny-base-server"
    pid: host
    networks:
      - traefik-net
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NETDATA_CLAIM_TOKEN=
      - NETDATA_CLAIM_ROOMS=
      - DOCKER_HOST=/var/run/docker.sock
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-net"
        # Route to Netdata UI via subdomain
        - "traefik.http.routers.netdata-http.rule=Host(`monitoring.shiny-base.ma-riviere.com`)"
        - "traefik.http.routers.netdata-http.entrypoints=web"
        - "traefik.http.routers.netdata-http.middlewares=https-redirect"
        - "traefik.http.routers.netdata-https.rule=Host(`monitoring.shiny-base.ma-riviere.com`)"
        - "traefik.http.routers.netdata-https.entrypoints=websecure"
        - "traefik.http.routers.netdata-https.tls=true"
        - "traefik.http.routers.netdata-https.tls.certresolver=le"
        # Basic auth middleware
        - "traefik.http.middlewares.netdata-auth.basicauth.users=admin:$$apr1$$ebf77506$$MVQjMUiEvhPVk.FoQ/yKj1"
        - "traefik.http.routers.netdata-https.middlewares=netdata-auth"
        # Service port
        - "traefik.http.services.netdata.loadbalancer.server.port=19999"

volumes:
  shiny_server_logs:
    driver: local
  shinylogs:
    driver: local
  traefik-certificates:
    driver: local
  netdata-config:
    driver: local
  netdata-lib:
    driver: local
  netdata-cache:
    driver: local

networks:
  traefik-net:
    name: traefik-net
